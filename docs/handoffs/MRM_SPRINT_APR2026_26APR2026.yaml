# ─── FILES CHANGED THIS SPRINT ───────────────────────────────

files_changed:

  - path: "core/route_planner/route_planner.py"
    action: MODIFIED
    requirements: ["PLN-02 R-03", "IT-ROLLBACK-01"]
    changes:
      - "_eta_s: float attribute added to RoutePlanner.__init__()"
      - "_cruise_speed_ms: float constructor parameter (default 27.78 m/s = AVP-02 100 km/h)"
      - "snap_eta_s, snap_target, snap_ew_age_ms, snap_terrain_phase added to snapshot block"
      - "_rollback() gains snap_eta_s_val parameter — restores _eta_s as 5th action"
      - "RETASK_ROLLBACK event payload extended to 10 fields including reason/previous_target/restored_ew_map_age_ms/restored_terrain_phase"
      - "TERRAIN_GEN_FAIL path: try/except around _terrain_regen_fn(), RETASK_TERRAIN_GEN_FAILED event, _rollback() call"
      - "COMMIT_FAIL path: try/except around _px4_upload_fn(), RETASK_COMMIT_FAILED event, _rollback() call"
    frozen_files_modified: []
    rationale: |
      R-03 ETA restore was absent — OI-56. ETA is a derived value but SRS Appendix B
      ROLLBACK action (5) explicitly requires Restore ETA. Implemented as live attribute
      computed from route_length_m / cruise_speed_ms. TERRAIN_GEN_FAIL and COMMIT_FAIL
      rollback triggers were entirely absent from production code despite compliance matrix
      claiming "Implemented" — corrected. RETASK_ROLLBACK payload was missing four
      SRS-required fields — extended to 10 fields.

  - path: "integration/bridge/hold_recovery.py"
    action: CREATED
    requirements: ["PX4-04 D10"]
    changes:
      - "HoldRecoveryHandler class — D10 HOLD mode recovery"
      - "attempt_offboard_recovery(ts_ms): 3 retries at 2s, 6s total window"
      - "Events: D10_HOLD_DETECTED, D10_OFFBOARD_RESTORED, D10_RETRY, D10_RECOVERY_FAILED"
      - "PX4_HOLD_CUSTOM_MODE = 50_593_792 constant in mavlink_bridge.py"
      - "T-MON HOLD detection block dispatches daemon thread (read-only constraint preserved)"
    frozen_files_modified: []
    rationale: |
      D10 was completely absent — "Documented Only" status. PX4 returns in HOLD
      (AUTO_LOITER, custom_mode=50_593_792) after reboot. Without this handler,
      a post-reboot HOLD condition would leave the vehicle in HOLD indefinitely.
      T-MON read-only constraint (CGM §1.3) preserved by dispatching recovery to
      a daemon thread via registered callback — same pattern as OffboardRecoveryFSM.

  - path: "integration/bridge/offboard_recovery_fsm.py"
    action: CREATED
    requirements: ["PX4-01 D1-D6", "EC-01"]
    changes:
      - "OffboardRecoveryFSM class — D1→D2→D3→D6 timeout chain"
      - "D2: 5s retry at 1Hz. D3: SHM_ENTRY + 5s retry. D6: OFFBOARD_UNRECOVERED + abort_fn()"
      - "Events: OFFBOARD_LOSS, SHM_ENTRY, SHM_EXIT, OFFBOARD_RESTORED, OFFBOARD_UNRECOVERED"
      - "SR-01 compliant: threading.Event().wait() throughout — no time.sleep(), no self._clock.now()"
      - "on_offboard_loss() dispatches daemon thread — T-MON remains read-only"
    frozen_files_modified: []
    rationale: |
      D6 (OFFBOARD_UNRECOVERED + ABORT_MISS after 10s) was entirely absent — compliance
      matrix falsely claimed "Implemented | Partially Tested". OFFBOARD_UNRECOVERED and
      ABORT_MISS did not exist in any production file. This is the D1→D2→D3→D6
      timeout escalation chain. abort_fn() callback keeps ABORT_MISS ownership
      with the caller — FSM owns only the timeout and signalling. SR-01 compliance
      is critical: the retry loop must not use simulation clock in synchronous context.

  - path: "core/checkpoint/checkpoint.py"
    action: MODIFIED
    requirements: ["PX4-05", "EC-02", "Appendix C CHECKPOINT_RESTORE"]
    changes:
      - "CheckpointCorruptError exception class added"
      - "Checkpoint.from_dict() validates 7 mandatory fields + schema_version == '1.2'"
      - "_emit_corrupt(path, reason) helper emits CHECKPOINT_CORRUPT WARNING event"
      - "_load() wrapped in try/except for FileNotFoundError, PermissionError, JSONDecodeError, CheckpointCorruptError"
      - "restore_latest() returns None on CheckpointCorruptError (does not propagate)"
      - "CHECKPOINT_RESTORED event extended with checkpoint_age_ms and waypoint_index fields"
    frozen_files_modified: []
    rationale: |
      _load() was 3 lines with no error handling. Silent defaults on missing fields
      was the most dangerous case — mission_abort_flag missing → defaults False →
      mission resumes autonomously when it should abort. Schema version check prevents
      v1.0 checkpoint silently restoring as v1.2 with safety fields at dangerous defaults.
      PROC_RESTART on corruption (SRS Appendix C) is approximated in SIL by returning
      None from restore_latest() and emitting CHECKPOINT_CORRUPT — real PROC_RESTART
      requires watchdog (Phase D).

  - path: "core/watchdog/process_watchdog.py"
    action: CREATED
    requirements: ["RS-03", "E-03"]
    changes:
      - "PROCESS_REGISTRY: 6 processes with restartability_class assignments"
      - "ProcessWatchdog class — decision logic for RESTARTABLE_WITH_SHM / RESTARTABLE_WITHOUT_SHM / NOT_RESTARTABLE"
      - "on_process_failure() dispatches daemon thread"
      - "NOT_RESTARTABLE path: ESKF_CORE_FAILURE (CRITICAL) + abort_fn() immediately"
      - "RESTARTABLE_WITH_SHM: SHM_ENTRY + restart loop + checkpoint_restore_fn + NAV_RESTORED"
      - "RESTARTABLE_WITHOUT_SHM: restart loop only"
      - "All attempts fail: PROCESS_RESTART_FAILED + abort_fn()"
    frozen_files_modified: []
    rationale: |
      RS-03 watchdog was entirely absent — compliance matrix falsely claimed
      "Implemented". restartability_class existed only in documentation. This
      implements the decision logic that a real watchdog would execute on process
      failure. Real SIGKILL stimulus (ST-RESTART-01) requires a production watchdog
      daemon — Phase D. The NOT_RESTARTABLE path (ESKFCore) must trigger ABORT_MISS
      immediately with no restart attempt — this is a safety-critical invariant.

  - path: "integration/bridge/reboot_detector.py"
    action: MODIFIED
    requirements: ["PX4-04 D7"]
    changes:
      - "PX4_REBOOT_DETECTED event extended with seq_reset_value and recovery_start_ms fields"
    frozen_files_modified: []
    rationale: |
      SRS §8.4 PX4-04 requires seq_reset_value in the D7 detection event.
      recovery_start_ms is required for the D7→D8 timing gate (≤15s window).
      Both fields were absent from the existing event payload.

  - path: "core/mission_manager/mission_manager.py"
    action: MODIFIED
    requirements: ["PX4-04 D8a"]
    changes:
      - "AUTONOMOUS_RESUME_APPROVED event added alongside MISSION_RESUME_AUTHORISED"
      - "pending_operator_clearance_required=False payload field added"
    frozen_files_modified: []
    rationale: |
      SRS §8.4 D8a gate requires AUTONOMOUS_RESUME_APPROVED as the canonical
      event name. MISSION_RESUME_AUTHORISED was the existing event — both are
      now emitted. IT-D9-CHAIN-01 gates on AUTONOMOUS_RESUME_APPROVED.

  - path: "docs/qa/SAL3_BASELINE_v1.0.md"
    action: CREATED
    requirements: ["AD-24 SAL-3"]
    changes:
      - "SAL-3 architecture baseline frozen — activation logic, gates, trust model, safety invariants"
      - "Five safety invariants. Six simulation test hooks. Four implementation clarifications."
    frozen_files_modified: []
    rationale: |
      SAL-3 is AVP-03 scope (Jammu-Leh corridor). Architecture frozen before
      implementation to prevent scope creep. The co-directional map staleness
      error is an accepted known limitation. Implementation cannot begin until
      seven prerequisites are met (documented in baseline).

