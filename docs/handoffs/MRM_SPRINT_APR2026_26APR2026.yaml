# ─── TEST GUIDANCE FOR DEPUTY 2 ──────────────────────────────

test_guidance:

  priority_modules:
    - module: "OffboardRecoveryFSM"
      file: "integration/bridge/offboard_recovery_fsm.py"
      reason: "Safety-critical — D6 path leads to ABORT_MISS. Test boundary conditions aggressively."
      adversarial_scenarios:
        - "send_set_mode_fn raises exception mid-retry (not just returns False)"
        - "send_set_mode_fn returns True on attempt 10 (last possible before timeout)"
        - "on_offboard_loss() called twice in rapid succession (duplicate loss events)"
        - "abort_fn raises an exception — does FSM handle gracefully?"
        - "Timing: d2_timeout_s=0, d3_timeout_s=0 — immediate D6"

    - module: "ProcessWatchdog"
      file: "core/watchdog/process_watchdog.py"
      reason: "NOT_RESTARTABLE path must never attempt restart — safety invariant."
      adversarial_scenarios:
        - "restart_fn raises exception — does NOT_RESTARTABLE path still return immediately?"
        - "checkpoint_restore_fn returns True but takes 15s (beyond restore_timeout_s=10s)"
        - "on_process_failure called for same process twice simultaneously"
        - "PROCESS_REGISTRY modified externally between calls"
        - "max_restart_attempts=0 — does it go directly to PROCESS_RESTART_FAILED?"

    - module: "CheckpointCorruptError / _load()"
      file: "core/checkpoint/checkpoint.py"
      reason: "Silent defaults on missing fields is a safety risk — push boundary cases."
      adversarial_scenarios:
        - "Valid JSON but all values are wrong types (e.g. mission_abort_flag=42)"
        - "schema_version present but None"
        - "Checkpoint file truncated mid-write (partial JSON — e.g. valid up to 80%)"
        - "Checkpoint file is a directory path (not a file)"
        - "restore_latest() called when store directory contains mix of valid and corrupt files"
        - "All 7 mandatory fields present but schema_version='2.0'"

    - module: "HoldRecoveryHandler"
      file: "integration/bridge/hold_recovery.py"
      reason: "3-retry timing chain — test edge cases at retry boundaries."
      adversarial_scenarios:
        - "send_set_mode_fn returns True on exactly attempt 3 (last retry)"
        - "total_window_s elapsed before first retry completes"
        - "attempt_offboard_recovery called while a previous call is still running"

    - module: "_rollback() payload + TERRAIN_GEN_FAIL/COMMIT_FAIL"
      file: "core/route_planner/route_planner.py"
      reason: "10-field payload — verify all fields present under each trigger path."
      adversarial_scenarios:
        - "_terrain_regen_fn raises a non-Exception (e.g. BaseException subclass)"
        - "_px4_upload_fn raises after partial upload (route partially committed)"
        - "RETASK_ROLLBACK emitted on TERRAIN_GEN_FAIL — verify reason='TERRAIN_GEN_FAIL' not 'DEAD_END'"
        - "Verify _eta_s is NOT updated on TERRAIN_GEN_FAIL (rollback must restore it)"

  fault_injection_applicable:
    - "FI-01: GNSS spoof during retask — verify TERRAIN_GEN_FAIL path fires correctly"
    - "FI-05: Thread restart during OffboardRecoveryFSM D2 phase"
    - "FI-07: ESKF core metric corruption — verify NOT_RESTARTABLE path triggers ABORT_MISS"

  jitter_seed_protocol: |
