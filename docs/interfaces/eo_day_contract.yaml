sensor_id: EO_DAY
description: >
  Day electro-optical camera — primary VIO source in day mode

current_source:
  type: SIL_simulation
  method: DEM_hillshade_tile_VIOFrameProcessor
  gate2_status: COMPLETE
  note: >
    Gate 2 complete. NadirCameraFrameBridge (Gazebo gz.transport) delivers frames to
    VIOFrameProcessor (Shi-Tomasi + CLAHE + Lucas-Kanade optical flow, Case C: OpenVINS
    not available). VIOEstimate produced at each frame. NAV-03 PASS.

real_replacement:
  type: RGB_camera_nadir
  format: ROS2_sensor_msgs_Image_or_direct
  rate_hz: 30
  resolution: 720p_minimum
  note: >
    OpenVINS processes real frames. ESKF receives OpenVINS output.
    No architecture change.

interface_class: core/ekf/error_state_ekf.py ErrorStateEKF.update_vio()
breaking_change_at_HIL: false
