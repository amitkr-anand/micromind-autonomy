sensor_id: TRN_CAMERA
description: >
  Nadir camera frame for terrain-relative navigation matching

current_source:
  type: SIL_simulation
  method: DEM_multidirectional_hillshade_tile
  gate2_status: COMPLETE
  note: >
    Gate 2 complete. PhaseCorrelationTRN validated on real SHIMLA-1 COP30 DEM.
    Multi-directional hillshade (illumination-invariant) used as correlation reference.
    Correction sign convention verified: +row_offset → north correction, -col_offset → east.
    NAV-01 TRN drift reduction: 37.17m → 23.63m over 35.5km Shimla corridor. NAV-02 PASS.

real_replacement:
  type: EO_camera_nadir
  format: uint8_numpy_array
  size_pixels: configurable
  rate_hz: 1_to_5
  note: >
    Real EO camera frame. Same numpy array interface. No architecture change.

interface_class: core/trn/phase_correlation_trn.py PhaseCorrelationTRN.match()
interface_param: camera_tile
breaking_change_at_HIL: false
