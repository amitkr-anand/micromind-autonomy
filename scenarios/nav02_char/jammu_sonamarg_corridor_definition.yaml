crs_tci: "EPSG:32643"
description: >
  Jammu to Sonamarg corridor via NH-1.
  230km total, GNSS-denied from km 30.
  Confirmed-good imagery on 5 western WPs
  (lap_var > 1200, sat < 35%) and 2 eastern WPs.
  Kashmir valley floor suppression zone km 120-180
  is expected and operationally representative.
  NOT a validated navigation performance corridor.
  EC-13 partial characterisation pending Run 4.
  Deputy 1 approved 2026-04-27.

operational_note: >
  This corridor is structurally identical to
  Shimla-Manali: mountain approach → valley
  suppression gap → mountain reconnect.
  Demonstrates correct system behaviour:
  TRN active on terrain, INS-only through valley,
  TRN resumes when terrain texture returns.

